# fultonj tmux config
set -g default-terminal "tmux-256color"
set -g history-limit 1000000

# Prefix Config
unbind C-b
set -g prefix C-j
bind C-j send-prefix

# Navigation & Behavior
set -g base-index 1
set -g renumber-windows on
set -g escape-time 0
set -g focus-events on # Helps with clipboard sync and vim

# macOS only
set-option -g default-shell /opt/homebrew/bin/bash
bind m set -g mouse \; display-message "Mouse mode: #{?mouse,ON,OFF}"

# --- Mouse & Clipboard Logic ---
set -g mouse on
set -g set-clipboard on

# 1. Selection: tmux selections copy to macOS clipboard via pbcopy
set -s copy-command 'pbcopy'

# 2. Middle-click paste from macOS clipboard
unbind -n MouseDown2Pane
bind -n MouseDown2Pane run "pbpaste | tmux load-buffer - && tmux paste-buffer"

# 3. Standard Paste (Prefix + p)
bind p run "pbpaste | tmux load-buffer - && tmux paste-buffer"

# 4. VI Mode Copying
set-window-option -g mode-keys vi
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"

# --- UI & Plugins ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'catppuccin/tmux'

set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_default_text "#W"
set -g @catppuccin_window_current_text "#W"
set -g @catppuccin_window_text "#W"
set -g @catppuccin_date_time_text " %d %b %H:%M"

set -g status-position top
set -g status-right-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_session}"
set -ag status-right "#{E:@catppuccin_status_application}"
set -ag status-right "#{E:@catppuccin_status_directory}"
set -ag status-right "#{E:@catppuccin_status_date_time}"

# transposes the current window with the window on the left
bind-key C-S-Left swap-window -t -1 \; previous-window

run '~/.tmux/plugins/tpm/tpm'
